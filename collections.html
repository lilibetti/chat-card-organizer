<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Collections</title>
<style>
  :root { --bg:#fafaf8; --ink:#1a1a1a; --muted:#888; --line:#e6e3dd; --acc:#c8472a; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.6 -apple-system,"PingFang SC","Hiragino Sans GB","Microsoft Yahei",sans-serif; color:var(--ink); background:var(--bg); }
  header { position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:center; gap:14px; z-index:10; flex-wrap:wrap; }
  header h1 { font-size:14px; font-weight:400; margin:0; letter-spacing:1px; }
  .top-spacer { flex:1; }
  .top-stat { color:var(--muted); font-size:12px; padding:4px 8px; }
  .top-stat b { color:var(--ink); font-weight:500; }
  a.btn, button.btn { display:inline-block; padding:6px 14px; border:1px solid var(--ink); background:transparent; color:var(--ink); text-decoration:none; font-size:12px; cursor:pointer; font-family:inherit; }
  a.btn:hover, button.btn:hover { background:var(--ink); color:var(--bg); }
  button.btn.danger { border-color:var(--acc); color:var(--acc); }
  button.btn.danger:hover { background:var(--acc); color:#fff; }
  button.btn.tiny { padding:3px 9px; font-size:11px; }

  main { padding:30px 24px; max-width:1600px; margin:0 auto; }
  .toolbar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .empty { text-align:center; color:var(--muted); padding:80px 0; }
  .empty .hint { font-size:12px; margin-top:8px; }
  .info-bar { background:#fffbe6; border:1px solid #f0e0a0; padding:8px 12px; font-size:11px; color:#888; margin-bottom:16px; }

  /* ====== 主视图 grid ====== */
  /* auto-fit 让块数随容器宽度自适应：宽屏(>=1600)装 5 个，窄屏自动减到 4/3/2/1，绝不溢出 */
  .coll-grid { display:grid; grid-template-columns:repeat(auto-fit, 200px); gap:133px; justify-content:center; padding:20px 0; }

  .cb { width:200px; min-height:180px; background:#fff; border:1px solid var(--line); padding:14px 16px; position:relative; cursor:pointer; display:flex; flex-direction:column; transition:border-color .15s; }
  .cb:hover { border-color:var(--ink); }
  .cb.dragging { opacity:0.4; }
  .cb-title { font-size:13px; font-weight:500; outline:none; margin-bottom:4px; line-height:1.4; word-break:break-all; min-height:18px; }
  .cb-title[contenteditable]:hover { background:#f5f3ee; }
  .cb-count { font-size:11px; color:var(--muted); margin-bottom:10px; }
  .cb-note { font-size:11px; color:#666; line-height:1.5; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; word-break:break-all; }
  .cb-note.empty { color:#bbb; }
  .cb-drag { position:absolute; bottom:4px; right:6px; color:var(--muted); cursor:grab; user-select:none; font-size:11px; }
  .cb-drag:active { cursor:grabbing; }

  /* ====== 详情视图 ====== */
  .note-area { background:#fff; border:1px solid var(--line); padding:14px 18px; min-height:50px; margin-bottom:18px; outline:none; font-size:13px; }
  .note-area[contenteditable]:hover { background:#f5f3ee; }
  .note-area .placeholder { color:#bbb; }

  .card-row { background:#fff; border:1px solid var(--line); margin-bottom:8px; }
  .card-row.dragging { opacity:0.4; }
  .card-row-head { display:flex; align-items:center; padding:10px 14px; gap:10px; cursor:pointer; }
  .card-row-head:hover { background:#fafaf8; }
  .card-row-caret { color:var(--muted); font-size:12px; transition:transform .15s; }
  .card-row.expanded .card-row-caret { transform:rotate(90deg); }
  .card-row-ts { font-size:10px; color:var(--muted); font-family:monospace; }
  .card-row-preview { flex:1; font-size:12px; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-row-meta { font-size:10px; color:var(--muted); }
  .card-row-drag { color:var(--muted); cursor:grab; user-select:none; font-size:11px; padding:0 4px; }
  .card-row-drag:active { cursor:grabbing; }
  .card-row-rm { background:none; border:1px solid var(--line); padding:2px 8px; font-size:10px; color:var(--muted); cursor:pointer; }
  .card-row-rm:hover { color:var(--acc); border-color:var(--acc); }
  .card-row-body { display:none; padding:14px 18px; border-top:1px solid var(--line); background:#fafaf8; }
  .card-row.expanded .card-row-body { display:block; }
  .card-row-body .role { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .card-row-body .role.user { color:var(--acc); }
  .card-row-body .content { font-size:13px; white-space:pre-wrap; word-wrap:break-word; line-height:1.7; margin-bottom:14px; }
  .card-row-body .content:last-child { margin-bottom:0; }

  /* ====== 加对话 dialog ====== */
  .modal-mask { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:100; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--bg); border:1px solid var(--ink); width:560px; max-width:90vw; max-height:80vh; display:flex; flex-direction:column; }
  .modal-head { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; }
  .modal-head h3 { margin:0; font-size:14px; font-weight:500; flex:1; }
  .modal-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted); padding:0 4px; }
  .modal-close:hover { color:var(--ink); }
  .modal-body { padding:16px 18px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:12px; }
  .modal-foot { padding:12px 18px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px; justify-content:flex-end; }
  .modal-foot .info { flex:1; font-size:12px; color:var(--muted); }
  .btn-primary { padding:6px 14px; border:1px solid var(--ink); background:var(--ink); color:var(--bg); font:inherit; cursor:pointer; }
  .btn-primary:hover { background:#000; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }

  .search-input { padding:6px 10px; border:1px solid var(--ink); font:inherit; color:var(--ink); background:var(--bg); }
  .search-list { max-height:400px; overflow-y:auto; border:1px solid var(--line); padding:4px; }
  .search-item { display:flex; gap:8px; padding:8px 10px; border:1px solid var(--line); margin-bottom:4px; cursor:pointer; align-items:flex-start; }
  .search-item:hover { border-color:var(--ink); }
  .search-item.on { background:#f5f3ee; border-color:var(--acc); }
  .search-item .ck { margin-top:2px; }
  .search-item .info { flex:1; min-width:0; }
  .search-item .info .ts { font-size:10px; color:var(--muted); font-family:monospace; }
  .search-item .info .preview { font-size:12px; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .search-item .info .pid { font-size:10px; color:#ccc; font-family:monospace; }

  /* Toast */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:10px 20px; font-size:13px; z-index:200; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <h1 id="pageTitle">Collections</h1>
  <div class="top-stat" id="pageStat" style="display:none"></div>
  <div class="top-spacer"></div>
  <a class="btn" id="backBtn" href="browse.html" style="display:none">← Collections</a>
  <a class="btn" id="browseBackBtn" href="browse.html">← 返回浏览</a>
  <button class="btn" id="newBtn">+ 新建</button>
  <button class="btn" id="exportAllBtn">导出全部</button>
  <button class="btn" id="importBtn">导入</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</header>

<main>
  <div class="info-bar">关闭页面不丢（localStorage）。<b>清浏览器数据会丢</b>，请定期点"导出全部"备份。</div>
  <div id="content"></div>
</main>

<script>
const STORAGE = 'chat-collections';
let CARDS = {};   // id -> card
let COLL = {};    // id -> {id, title, note, card_ids, created_at, order}
let CURRENT_COL_ID = null;

function loadAll() {
  try { COLL = JSON.parse(localStorage.getItem(STORAGE) || '{}'); } catch { COLL = {}; }
  // 迁移：补 order
  let needSave = false;
  const arr = Object.values(COLL);
  arr.sort((a,b) => (a.order ?? 0) - (b.order ?? 0) || (a.created_at || '').localeCompare(b.created_at || ''));
  arr.forEach((c, i) => {
    if (c.order === undefined) { c.order = i; needSave = true; }
  });
  if (needSave) saveColl();
}
function saveColl() { localStorage.setItem(STORAGE, JSON.stringify(COLL)); }
function genId() { return 'col_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function getCardById(id) { return CARDS[id] || null; }
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast show';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
}

// 复用 03-label 风格的 md 函数（简化版，仅 pre-wrap）
function mdPlain(s) {
  if (!s) return '';
  return esc(s);
}

// ===== 导出 md（保留原版） =====
function exportMd(colId) {
  const c = COLL[colId];
  if (!c) return;
  const lines = [];
  lines.push(`# ${c.title || '(无标题)'}`);
  lines.push('');
  lines.push(`_创建于 ${(c.created_at || '').replace('T',' ').replace('Z','')}_`);
  lines.push(`_卡片数：${(c.card_ids || []).length}_`);
  if (c.note) { lines.push(''); lines.push(c.note); }
  lines.push('');
  lines.push('---');
  lines.push('');
  for (const cid of (c.card_ids || [])) {
    const card = getCardById(cid);
    if (!card) continue;
    lines.push(`## ${(card.ts || '').replace('T',' ').replace('Z','')}`);
    lines.push('');
    lines.push('**user:**');
    lines.push('');
    lines.push((card.user || '').trim());
    lines.push('');
    lines.push('**assistant:**');
    lines.push('');
    lines.push((card.assistant || '').trim());
    lines.push('');
    lines.push('---');
    lines.push('');
  }
  const md = lines.join('\n');
  const fname = (c.title || 'collection').replace(/[\\/:*?"<>|]/g, '_') + '.md';
  triggerDownload(new Blob([md], { type: 'text/markdown;charset=utf-8' }), fname);
}
function triggerDownload(blob, fname) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}
function exportAllZip() {
  if (!Object.keys(COLL).length) { alert('没有任何 collection'); return; }
  const choice = confirm('点"确定" = 导出 JSON 备份（含所有 collection + 说明 + 卡片引用）\n点"取消" = 逐个下载 .md');
  if (choice) {
    const dump = { meta: { exported_at: new Date().toISOString(), version: 1 }, collections: COLL };
    triggerDownload(new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' }), 'collections-' + new Date().toISOString().slice(0,10) + '.json');
  } else {
    for (const id of Object.keys(COLL)) setTimeout(() => exportMd(id), 100);
  }
}
function importJson(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.collections) {
        const existing = Object.keys(COLL).length;
        if (existing > 0 && !confirm(`已有 ${existing} 个 collection，导入会覆盖。继续？`)) return;
        COLL = d.collections;
        saveColl();
        checkHash();
        alert('已导入 ' + Object.keys(COLL).length + ' 个 collection');
      } else {
        alert('文件格式不对：没有 collections 字段');
      }
    } catch (err) { alert('解析失败：' + err.message); }
  };
  r.readAsText(file, 'utf-8');
}

// ===== 增删改 =====
function createNew() {
  const id = genId();
  const maxOrder = Math.max(-1, ...Object.values(COLL).map(c => c.order ?? 0));
  COLL[id] = { id, title: '未命名', note: '', card_ids: [], created_at: new Date().toISOString(), order: maxOrder + 1 };
  saveColl();
  // 进入新建的详情
  location.hash = '#' + id;
}
function deleteCol(id) {
  if (!confirm('确定删除这个 collection？卡片本身不会被删除。')) return;
  delete COLL[id];
  saveColl();
  if (CURRENT_COL_ID === id) {
    history.pushState(null, '', location.pathname);
    CURRENT_COL_ID = null;
  }
  checkHash();
}
function updateCol(id, field, val) {
  if (!COLL[id]) return;
  COLL[id][field] = val;
  saveColl();
}
function removeCardFromCol(colId, cardId) {
  const c = COLL[colId];
  if (!c) return;
  c.card_ids = c.card_ids.filter(x => x !== cardId);
  saveColl();
  renderDetail(colId);
}
function reorderCard(colId, fromIdx, toIdx) {
  const c = COLL[colId];
  if (!c) return;
  const arr = c.card_ids;
  if (fromIdx < 0 || toIdx < 0 || fromIdx >= arr.length || toIdx >= arr.length) return;
  const [item] = arr.splice(fromIdx, 1);
  arr.splice(toIdx, 0, item);
  saveColl();
  renderDetail(colId);
}
function reorderColl(fromIdx, toIdx) {
  const sorted = Object.values(COLL).sort((a,b) => (a.order ?? 0) - (b.order ?? 0) || (a.created_at || '').localeCompare(b.created_at || ''));
  if (fromIdx < 0 || toIdx < 0 || fromIdx >= sorted.length || toIdx >= sorted.length) return;
  const [moved] = sorted.splice(fromIdx, 1);
  sorted.splice(toIdx, 0, moved);
  sorted.forEach((c, i) => c.order = i);
  saveColl();
  renderGrid();
}

// ===== 主视图 grid =====
function renderGrid() {
  CURRENT_COL_ID = null;
  document.getElementById('pageTitle').textContent = 'Collections';
  document.getElementById('pageStat').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('browseBackBtn').style.display = 'inline-block';

  const ct = document.getElementById('content');
  ct.innerHTML = '';
  const sorted = Object.values(COLL).sort((a,b) => (a.order ?? 0) - (b.order ?? 0) || (a.created_at || '').localeCompare(b.created_at || ''));
  if (!sorted.length) {
    ct.innerHTML = `<div class="empty">（还没有 collection）<div class="hint">点右上角"+ 新建"创建，或在 browse.html 勾选卡片后新建</div></div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'coll-grid';
  sorted.forEach((c, idx) => grid.appendChild(buildBlock(c, idx)));
  ct.appendChild(grid);
}
function buildBlock(c, idx) {
  const sorted = Object.values(COLL).sort((a,b) => (a.order ?? 0) - (b.order ?? 0) || (a.created_at || '').localeCompare(b.created_at || ''));
  const block = document.createElement('div');
  block.className = 'cb';
  block.draggable = true;
  block.dataset.colId = c.id;
  block.dataset.idx = idx;
  // 标题（contenteditable）
  const title = document.createElement('div');
  title.className = 'cb-title';
  title.contentEditable = 'true';
  title.spellcheck = false;
  title.textContent = c.title || '未命名';
  title.onclick = (e) => e.stopPropagation();  // 阻止进详情
  title.onblur = () => {
    updateCol(c.id, 'title', title.textContent.trim() || '未命名');
  };
  title.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); title.blur(); } };
  block.appendChild(title);
  // 计数
  const cnt = document.createElement('div');
  cnt.className = 'cb-count';
  const n = (c.card_ids || []).length;
  cnt.textContent = `${n} 张${c.note ? '' : (n ? '' : ' · 无笔记')}`;
  block.appendChild(cnt);
  // 笔记预览
  const note = document.createElement('div');
  if (c.note) {
    note.className = 'cb-note';
    note.textContent = c.note;
  } else {
    note.className = 'cb-note empty';
    note.textContent = '（无笔记）';
  }
  block.appendChild(note);
  // 拖手柄
  const drag = document.createElement('div');
  drag.className = 'cb-drag';
  drag.textContent = '⋮⋮';
  drag.onclick = (e) => e.stopPropagation();
  block.appendChild(drag);
  // 点击进详情（除标题/拖手柄）
  block.onclick = (e) => {
    if (e.target === title || e.target === drag) return;
    location.hash = '#' + c.id;
  };
  // 拖动重排
  block.ondragstart = e => {
    block.classList.add('dragging');
    e.dataTransfer.setData('text/plain', String(idx));
    e.dataTransfer.effectAllowed = 'move';
  };
  block.ondragend = () => block.classList.remove('dragging');
  block.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  block.ondrop = e => {
    e.preventDefault();
    e.stopPropagation();
    const from = parseInt(e.dataTransfer.getData('text/plain'));
    const to = parseInt(block.dataset.idx);
    if (Number.isInteger(from) && Number.isInteger(to) && from !== to) {
      reorderColl(from, to);
    }
  };
  return block;
}

// ===== 详情视图 =====
function renderDetail(colId) {
  const c = COLL[colId];
  if (!c) {
    history.pushState(null, '', location.pathname);
    renderGrid();
    return;
  }
  CURRENT_COL_ID = colId;
  document.getElementById('pageTitle').textContent = c.title || '未命名';
  document.getElementById('pageStat').style.display = 'inline-block';
  document.getElementById('pageStat').textContent = `${(c.card_ids || []).length} 张`;
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('backBtn').onclick = (e) => { e.preventDefault(); history.pushState(null, '', location.pathname); renderGrid(); };
  document.getElementById('browseBackBtn').style.display = 'none';

  const ct = document.getElementById('content');
  ct.innerHTML = '';
  // 笔记
  const note = document.createElement('div');
  note.className = 'note-area';
  note.contentEditable = 'true';
  note.spellcheck = false;
  if (c.note) note.textContent = c.note;
  else note.innerHTML = '<span class="placeholder">（点此写说明：这个 collection 准备用来写什么文章）</span>';
  note.onfocus = () => { if (note.querySelector('.placeholder')) note.innerHTML = ''; };
  note.onblur = () => {
    const txt = note.textContent.trim();
    if (!txt) note.innerHTML = '<span class="placeholder">（点此写说明：这个 collection 准备用来写什么文章）</span>';
    updateCol(c.id, 'note', txt);
  };
  ct.appendChild(note);
  // 工具栏（加对话 / 导出 / 删除）
  const toolbar = document.createElement('div');
  toolbar.className = 'toolbar';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn';
  addBtn.textContent = '+ 加对话';
  addBtn.onclick = () => openAddCardDialog(c.id);
  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn';
  exportBtn.textContent = '导出 .md';
  exportBtn.onclick = () => exportMd(c.id);
  const delBtn = document.createElement('button');
  delBtn.className = 'btn danger';
  delBtn.textContent = '删除 collection';
  delBtn.onclick = () => deleteCol(c.id);
  toolbar.appendChild(addBtn);
  toolbar.appendChild(exportBtn);
  toolbar.appendChild(delBtn);
  ct.appendChild(toolbar);
  // 对话列表
  const list = document.createElement('div');
  list.className = 'card-list';
  if (!(c.card_ids || []).length) {
    const emp = document.createElement('div');
    emp.className = 'empty';
    emp.innerHTML = '<div>（空）点"+ 加对话"选择要加入的对话</div>';
    list.appendChild(emp);
  } else {
    c.card_ids.forEach((cid, idx) => {
      const card = getCardById(cid);
      if (!card) return;
      list.appendChild(buildCardRow(c.id, card, idx));
    });
  }
  ct.appendChild(list);
}
function buildCardRow(colId, card, idx) {
  const row = document.createElement('div');
  row.className = 'card-row';
  row.draggable = true;
  row.dataset.cardId = card.id;
  row.dataset.idx = idx;
  const head = document.createElement('div');
  head.className = 'card-row-head';
  const caret = document.createElement('span');
  caret.className = 'card-row-caret';
  caret.textContent = '▸';
  head.appendChild(caret);
  const ts = document.createElement('span');
  ts.className = 'card-row-ts';
  ts.textContent = (card.ts || '').replace('T',' ').slice(0,16);
  head.appendChild(ts);
  const preview = document.createElement('span');
  preview.className = 'card-row-preview';
  const userText = (card.user || '').slice(0, 80) + ((card.user || '').length > 80 ? '…' : '');
  preview.textContent = userText;
  head.appendChild(preview);
  const meta = document.createElement('span');
  meta.className = 'card-row-meta';
  const cnt = (card.user ? 1 : 0) + (card.assistant ? 1 : 0);
  meta.textContent = `${cnt} 段`;
  head.appendChild(meta);
  const drag = document.createElement('span');
  drag.className = 'card-row-drag';
  drag.textContent = '⋮⋮';
  drag.onclick = (e) => e.stopPropagation();
  head.appendChild(drag);
  const rm = document.createElement('button');
  rm.className = 'card-row-rm';
  rm.textContent = '×';
  rm.onclick = (e) => { e.stopPropagation(); removeCardFromCol(colId, card.id); };
  head.appendChild(rm);
  head.onclick = (e) => {
    if (e.target === drag || e.target === rm) return;
    row.classList.toggle('expanded');
  };
  row.appendChild(head);
  // 展开体
  const body = document.createElement('div');
  body.className = 'card-row-body';
  if (card.user) {
    const uRole = document.createElement('div');
    uRole.className = 'role user';
    uRole.textContent = 'user';
    body.appendChild(uRole);
    const u = document.createElement('div');
    u.className = 'content';
    u.textContent = card.user;
    body.appendChild(u);
  }
  if (card.assistant) {
    const aRole = document.createElement('div');
    aRole.className = 'role';
    aRole.textContent = 'ai';
    body.appendChild(aRole);
    const a = document.createElement('div');
    a.className = 'content';
    a.textContent = card.assistant;
    body.appendChild(a);
  }
  row.appendChild(body);
  // 拖动重排
  row.ondragstart = e => {
    row.classList.add('dragging');
    e.dataTransfer.setData('text/plain', String(idx));
    e.dataTransfer.effectAllowed = 'move';
  };
  row.ondragend = () => row.classList.remove('dragging');
  row.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  row.ondrop = e => {
    e.preventDefault();
    e.stopPropagation();
    const from = parseInt(e.dataTransfer.getData('text/plain'));
    const to = parseInt(row.dataset.idx);
    if (Number.isInteger(from) && Number.isInteger(to) && from !== to) {
      reorderCard(colId, from, to);
    }
  };
  return row;
}

// ===== 加对话 dialog（搜索 + 勾选 + 确认加入当前） =====
let addDialogSel = new Set();
function openAddCardDialog(colId) {
  const c = COLL[colId];
  if (!c) return;
  const existing = new Set(c.card_ids || []);
  addDialogSel = new Set();
  const mask = document.createElement('div');
  mask.className = 'modal-mask';
  mask.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3>加对话到「${esc(c.title || '未命名')}」</h3>
        <button class="modal-close" id="acClose">×</button>
      </div>
      <div class="modal-body">
        <input class="search-input" id="acSearch" placeholder="搜索 user/assistant 内容…" style="width:100%" />
        <div class="search-list" id="acList"></div>
      </div>
      <div class="modal-foot">
        <div class="info" id="acInfo">已选 0 张</div>
        <button class="btn-primary" id="acConfirm" disabled>加入「${esc(c.title || '未命名')}」</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);
  const close = () => mask.remove();
  document.getElementById('acClose').onclick = close;
  mask.onclick = close;
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
  });

  const allCards = Object.values(CARDS);
  const updateList = (q) => {
    const list = document.getElementById('acList');
    list.innerHTML = '';
    const ql = (q || '').toLowerCase();
    let shown = 0;
    for (const card of allCards) {
      if (ql) {
        const hay = ((card.user || '') + '\n' + (card.assistant || '')).toLowerCase();
        if (!hay.includes(ql)) continue;
      }
      // 跳过已在 collection 里的（仍显示但 disabled）
      const it = document.createElement('div');
      it.className = 'search-item' + (existing.has(card.id) ? ' on disabled' : (addDialogSel.has(card.id) ? ' on' : ''));
      it.dataset.cardId = card.id;
      const ck = document.createElement('input');
      ck.type = 'checkbox';
      ck.className = 'ck';
      ck.checked = existing.has(card.id) || addDialogSel.has(card.id);
      ck.disabled = existing.has(card.id);
      it.appendChild(ck);
      const info = document.createElement('div');
      info.className = 'info';
      const ts = document.createElement('div');
      ts.className = 'ts';
      ts.textContent = (card.ts || '').replace('T',' ').slice(0,16);
      const prev = document.createElement('div');
      prev.className = 'preview';
      prev.textContent = (card.user || '').slice(0, 100) + ((card.user || '').length > 100 ? '…' : '');
      const pid = document.createElement('div');
      pid.className = 'pid';
      pid.textContent = card.id;
      info.appendChild(ts);
      info.appendChild(prev);
      info.appendChild(pid);
      it.appendChild(info);
      if (!existing.has(card.id)) {
        it.onclick = () => {
          if (addDialogSel.has(card.id)) {
            addDialogSel.delete(card.id);
            it.classList.remove('on');
            ck.checked = false;
          } else {
            addDialogSel.add(card.id);
            it.classList.add('on');
            ck.checked = true;
          }
          updateInfo();
        };
      }
      list.appendChild(it);
      shown++;
      if (shown >= 200) {
        const more = document.createElement('div');
        more.style.cssText = 'color:var(--muted);font-size:11px;padding:6px;text-align:center;';
        more.textContent = '（显示前 200 条，搜索以缩小范围）';
        list.appendChild(more);
        break;
      }
    }
  };
  const updateInfo = () => {
    document.getElementById('acInfo').textContent = `已选 ${addDialogSel.size} 张`;
    document.getElementById('acConfirm').disabled = addDialogSel.size === 0;
  };
  document.getElementById('acSearch').oninput = (e) => updateList(e.target.value);
  updateList('');
  updateInfo();

  document.getElementById('acConfirm').onclick = () => {
    const c2 = COLL[colId];
    if (!c2) { close(); return; }
    const cur = new Set(c2.card_ids || []);
    let n = 0;
    for (const id of addDialogSel) { if (!cur.has(id)) { cur.add(id); n++; } }
    c2.card_ids = [...cur];
    saveColl();
    close();
    showToast(`已加入 ${n} 张对话`);
    renderDetail(colId);
  };
}

// ===== 路由 =====
function checkHash() {
  const h = location.hash.replace(/^#/, '');
  if (h && COLL[h]) {
    renderDetail(h);
  } else {
    renderGrid();
  }
}

// ===== init =====
async function init() {
  loadAll();
  try {
    const r = await fetch('02-cards.json');
    const d = await r.json();
    for (const c of (d.cards || [])) CARDS[c.id] = c;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">无法加载 02-cards.json：${e.message}<br>请用 <code>05-serve.py</code> 启动 http server</div>`;
    return;
  }
  document.getElementById('newBtn').onclick = createNew;
  document.getElementById('exportAllBtn').onclick = exportAllZip;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = e => { if (e.target.files[0]) importJson(e.target.files[0]); };
  checkHash();
  window.addEventListener('hashchange', checkHash);
}
init();
</script>
